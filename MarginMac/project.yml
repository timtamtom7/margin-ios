name: MarginMac
options:
  bundleIdPrefix: com.margin
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  MarginMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
      - path: ../Margin/Sources/Models
        type: group
      - path: ../Margin/Sources/Services
        type: group
        excludes:
          - "VoiceService.swift"
      - path: ../Margin/Sources/Utilities
        type: group
      - path: ../Margin/Resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.margin.macos
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_STYLE: Manual
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
    dependencies:
      - package: SQLite.swift
        product: SQLite

packages:
  SQLite.swift:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.0"
